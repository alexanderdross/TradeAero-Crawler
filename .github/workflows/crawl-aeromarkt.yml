name: "Crawl Aeromarkt.net"

on:
  schedule:
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:
    inputs:
      target:
        description: "Crawl target"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - aircraft
          - parts

env:
  NODE_VERSION: "22"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWLER_SYSTEM_USER_ID: ${{ secrets.CRAWLER_SYSTEM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIGHT_DATA_PROXY_URL: ${{ secrets.BRIGHT_DATA_PROXY_URL }}
          CRAWL_DELAY_MS: "3000"
        run: node dist/index.js --source aeromarkt --target "${{ github.event.inputs.target || 'all' }}"
