name: "Download Manufacturer Logos"

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Crawler
        uses: actions/checkout@v4

      - name: Checkout Refactor (for logo output)
        uses: actions/checkout@v4
        with:
          repository: alexanderdross/TradeAero-Refactor
          path: TradeAero-Refactor
          token: ${{ secrets.REFACTOR_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Download logos via Bright Data proxy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIGHT_DATA_PROXY_URL: ${{ secrets.BRIGHT_DATA_PROXY_URL }}
          LOGO_OUTPUT_DIR: ./TradeAero-Refactor/public/assets/logos
        run: npx tsx src/scripts/download-logos.ts

      - name: List downloaded logos
        run: |
          echo "=== All logos ==="
          ls -la TradeAero-Refactor/public/assets/logos/*-logo* 2>/dev/null | wc -l
          echo "=== New/changed files ==="
          cd TradeAero-Refactor && git status --short public/assets/logos/

      - name: Commit and push logos to Refactor repo
        run: |
          cd TradeAero-Refactor
          git config user.name "TradeAero Bot"
          git config user.email "bot@trade.aero"
          git add public/assets/logos/*-logo*
          if git diff --cached --quiet; then
            echo "No new logos to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "Add ${COUNT} manufacturer logos (auto-downloaded via Bright Data)"
            git push
            echo "Pushed ${COUNT} new logos to TradeAero-Refactor"
          fi
