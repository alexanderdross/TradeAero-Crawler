name: "Download Manufacturer Logos"

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Crawler
        uses: actions/checkout@v4

      - name: Create logos output directory
        run: mkdir -p logos

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Download logos via Bright Data proxy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIGHT_DATA_PROXY_URL: ${{ secrets.BRIGHT_DATA_PROXY_URL }}
          LOGO_OUTPUT_DIR: ./logos
        run: npx tsx src/scripts/download-logos.ts

      - name: List downloaded logos
        run: ls -la logos/*-logo* 2>/dev/null && echo "---" && ls logos/*-logo* 2>/dev/null | wc -l || echo "No logos found"

      - name: Upload logos as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manufacturer-logos
          path: logos/*-logo*
          retention-days: 90
          if-no-files-found: warn
