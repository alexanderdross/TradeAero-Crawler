name: "Seed Aircraft Reference Specs"

on:
  schedule:
    - cron: "0 7 * * 0"  # Weekly: Sunday 7 AM UTC — fills skeleton rows from UGC listings
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Seed reference specs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx src/scripts/seed-reference-specs.ts
