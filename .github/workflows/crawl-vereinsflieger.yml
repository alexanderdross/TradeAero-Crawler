name: "Crawl Vereinsflieger"

on:
  schedule:
    # Weekly on Sunday at 09:00 UTC. Events change slowly (orgs publish
    # them weeks-to-months ahead), so daily was overkill and adds noise
    # to the admin run-history tab. Admins can still fire the crawler
    # on-demand from /dashboard/admin/#crawler when they want a refresh
    # between scheduled runs.
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      target:
        description: "Crawl target (only 'events' is meaningful for this source)"
        required: false
        default: "events"
        type: choice
        options:
          - events
          - all

env:
  NODE_VERSION: "22"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run crawler
        env:
          CRAWLER_ENABLED: ${{ vars.CRAWLER_ENABLED }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWLER_SYSTEM_USER_ID: ${{ secrets.CRAWLER_SYSTEM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL_DELAY_MS: "2000"
        run: node dist/index.js --source vereinsflieger --target "${{ github.event.inputs.target || 'events' }}"
