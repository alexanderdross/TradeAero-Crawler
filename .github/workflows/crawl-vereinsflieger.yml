name: "Crawl Vereinsflieger"

on:
  schedule:
    # Daily at 09:00 UTC — scheduled after helmut (06:00) / aircraft24 (07:00)
    # / aeromarkt (08:00) so a "crawl-all" admin trigger doesn't stack.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Crawl target (only 'events' is meaningful for this source)"
        required: false
        default: "events"
        type: choice
        options:
          - events
          - all

env:
  NODE_VERSION: "22"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run crawler
        env:
          CRAWLER_ENABLED: ${{ vars.CRAWLER_ENABLED }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWLER_SYSTEM_USER_ID: ${{ secrets.CRAWLER_SYSTEM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL_DELAY_MS: "2000"
        run: node dist/index.js --source vereinsflieger --target "${{ github.event.inputs.target || 'events' }}"
