name: "Crawl Eurocontrol"

on:
  schedule:
    # Weekly on Sunday — Tier-1 sources stagger 30 min apart and run
    # AFTER Tier-2 slots (which finish by 11:30 UTC) so the cross-source
    # dedup check sees the lower-priority rows already in place when a
    # Tier-1 row supersedes them.
    - cron: "30 13 * * 0"
  workflow_dispatch:
    inputs:
      target:
        description: "Crawl target (only 'events' is meaningful for this source)"
        required: false
        default: "events"
        type: choice
        options:
          - events
          - all

env:
  NODE_VERSION: "22"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run crawler
        env:
          CRAWLER_ENABLED: ${{ vars.CRAWLER_ENABLED }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWLER_SYSTEM_USER_ID: ${{ secrets.CRAWLER_SYSTEM_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIGHT_DATA_PROXY_URL: ${{ secrets.BRIGHT_DATA_PROXY_URL }}
          CRAWL_DELAY_MS: "3000"
        run: node dist/index.js --source eurocontrol --target "${{ github.event.inputs.target || 'events' }}"
